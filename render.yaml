databases:
  - name: shortify-db
    plan: free
    databaseName: shortify
    user: shortify_user

services:
  # 1. Backend (Spring Boot Web Service)
  - type: web
    name: shortify-backend
    env: java
    plan: free
    rootDir: backend
    buildCommand: mvn clean package -DskipTests
    startCommand: java -jar target/shortify-0.0.1-SNAPSHOT.jar
    envVars:
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: shortify-db
          property: connectionString
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: shortify-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: shortify-db
          property: password
      - key: JWT_SECRET
        generateValue: true

  # 2. Frontend (Vite Static Site)
  - type: static
    name: shortify-frontend
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: shortify-backend
          property: host
