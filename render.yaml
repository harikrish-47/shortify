databases:
  - name: shortify-db
    plan: free
    databaseName: shortify
    user: shortify_user

services:
  # 1. Backend (Spring Boot Dockerized Web Service)
  - type: web
    name: shortify-backend
    env: docker
    plan: free
    rootDir: backend
    # Note: Environment variable values from databases work fine here
    envVars:
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: shortify-db
          property: connectionString
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: shortify-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: shortify-db
          property: password
      - key: JWT_SECRET
        generateValue: true

  # 2. Frontend (Vite Static Site)
  - type: web
    name: shortify-frontend
    runtime: static
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishPath: dist
    # Rewrite for React Router (Single Page App)
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
